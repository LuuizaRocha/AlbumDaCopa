<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Álbum Copa 2026</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap"
    rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="dados.js"></script>
  <style>
    /* Mesmo estilo anterior, mas sem as classes de transferência/badge de notificação. 
       Adicionei .sticker-slot.highlight e o modal de pesquisa. */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #080a10;
      --surface: #10141f;
      --surface2: #171d2d;
      --surface3: #1f2840;
      --border: rgba(255, 255, 255, 0.07);
      --primary: #f7d44a;
      --primary-dark: #c9a92e;
      --primary-glow: rgba(247, 212, 74, 0.15);
      --green: #2ecc71;
      --green-dark: #25a85d;
      --green-glow: rgba(46, 204, 113, 0.15);
      --red: #e74c3c;
      --text: #edf0f7;
      --text-secondary: #8892aa;
      --text-muted: #535e78;
      --radius-sm: 10px;
      --radius: 14px;
      --radius-lg: 20px;
      --shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background-image:
        radial-gradient(ellipse 80% 50% at 10% 0%, rgba(247, 212, 74, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(46, 204, 113, 0.04) 0%, transparent 60%);
    }

    #loginScreen {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px 0;
    }

    .login-trophy {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 4px;
    }

    .login-title {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, #f0b34b 50%, #ffd700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .login-sub {
      color: var(--text-secondary);
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 16px;
    }

    .login-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: var(--shadow);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 13px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }

    .input-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .input-wrap input::placeholder {
      color: var(--text-muted);
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: transform 0.15s var(--ease), box-shadow 0.15s var(--ease), opacity 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(0.97) !important;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #0a0c14;
      box-shadow: 0 4px 16px var(--primary-glow);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(247, 212, 74, 0.3);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .btn-green {
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: #0a0c14;
      box-shadow: 0 4px 16px var(--green-glow);
    }

    .btn-green:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(46, 204, 113, 0.35);
    }

    .btn-sm {
      padding: 6px 14px;
      font-size: 0.78rem;
    }

    .login-error {
      font-size: 0.88rem;
      text-align: center;
      min-height: 20px;
      font-weight: 500;
      color: var(--red);
    }

    .login-error.ok {
      color: var(--green);
    }

    #albumScreen {
      display: none;
      width: 100%;
      max-width: 1320px;
      flex-direction: column;
      gap: 16px;
    }

    .album-header {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 14px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .header-title {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #f0b34b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
      flex-shrink: 0;
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: var(--surface2);
      padding: 5px 12px;
      border-radius: 30px;
      border: 1px solid var(--border);
    }

    .header-user strong {
      color: var(--text);
      font-weight: 600;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .global-bar-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .global-bar-label {
      font-size: 0.82rem;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .global-bar-label strong {
      color: var(--primary);
    }

    .progress-bar-track {
      flex: 1;
      height: 6px;
      background: var(--surface3);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--green));
      border-radius: 99px;
      transition: width 0.4s var(--ease);
      min-width: 2px;
    }

    .global-bar-pct {
      font-size: 0.82rem;
      color: var(--text-secondary);
      white-space: nowrap;
      min-width: 36px;
      text-align: right;
    }

    .nav-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .nav-arrows {
      display: flex;
      gap: 6px;
    }

    .nav-btn-arrow {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 38px;
      height: 38px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      font-family: inherit;
    }

    .nav-btn-arrow:hover {
      background: var(--surface3);
      border-color: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }

    .nav-country {
      flex: 1;
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .nav-country h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-group-badge {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--primary);
      background: var(--primary-glow);
      border: 1px solid rgba(247, 212, 74, 0.25);
      padding: 2px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .nav-page {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .nav-page strong {
      color: var(--text);
      font-weight: 600;
    }

    .country-progress-badge {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .country-progress-badge.done {
      color: var(--green);
      border-color: rgba(46, 204, 113, 0.3);
      background: var(--green-glow);
    }

    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 14px;
    }

    .sticker-slot {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      aspect-ratio: 7 / 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 8px;
      cursor: pointer;
      transition: transform 0.2s var(--ease), border-color 0.2s var(--ease), box-shadow 0.2s var(--ease), background 0.2s;
      position: relative;
      text-align: center;
      user-select: none;
      min-height: 140px;
      gap: 6px;
    }

    .sticker-slot:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: rgba(247, 212, 74, 0.5);
      box-shadow: 0 10px 30px var(--primary-glow);
    }

    .sticker-slot.empty {
      background: var(--surface);
    }

    .sticker-slot.empty .slot-icon {
      opacity: 0.25;
    }

    .sticker-slot.empty .slot-label {
      color: var(--text-muted);
    }

    .sticker-slot.empty .slot-number {
      opacity: 0.3;
    }

    .sticker-slot.collected {
      background: rgba(20, 55, 38, 0.6);
      border-color: rgba(46, 204, 113, 0.45);
      box-shadow: 0 0 0 1px rgba(46, 204, 113, 0.2), inset 0 1px 0 rgba(46, 204, 113, 0.1);
    }

    .sticker-slot.collected:hover {
      border-color: var(--green);
      box-shadow: 0 10px 30px var(--green-glow), 0 0 0 1px rgba(46, 204, 113, 0.3);
    }

    .sticker-slot.pop {
      animation: pop 0.3s var(--ease);
    }

    @keyframes pop {
      0% {
        transform: scale(0.88);
      }

      55% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1);
      }
    }

    .sticker-slot.highlight {
      animation: highlightPulse 1.5s ease infinite;
      border-color: var(--primary) !important;
      box-shadow: 0 0 20px rgba(247, 212, 74, 0.5), 0 0 40px rgba(247, 212, 74, 0.2);
    }

    @keyframes highlightPulse {

      0%,
      100% {
        box-shadow: 0 0 15px rgba(247, 212, 74, 0.4), 0 0 30px rgba(247, 212, 74, 0.1);
      }

      50% {
        box-shadow: 0 0 30px rgba(247, 212, 74, 0.7), 0 0 60px rgba(247, 212, 74, 0.3);
      }
    }

    .slot-number {
      position: absolute;
      top: 7px;
      left: 9px;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .sticker-slot.collected .slot-number {
      color: rgba(46, 204, 113, 0.7);
    }

    .slot-icon {
      font-size: 2.2rem;
      line-height: 1;
      transition: transform 0.2s var(--ease);
    }

    .sticker-slot:hover .slot-icon {
      transform: scale(1.1);
    }

    .slot-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.3;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
      padding: 0 4px;
    }

    .sticker-slot.collected .slot-label {
      color: #8ed6a8;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(15, 20, 35, 0.95);
      backdrop-filter: blur(16px);
      color: var(--text);
      padding: 11px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 999;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s var(--ease);
      pointer-events: none;
      text-align: center;
      max-width: 92%;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      border-color: rgba(46, 204, 113, 0.35);
    }

    .toast.error {
      border-color: rgba(231, 76, 60, 0.35);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.hidden {
      display: none !important;
    }

    .modal {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 90%;
      max-width: 520px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .modal-header h3 {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      font-family: inherit;
    }

    .modal-close:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }

    .search-input:focus {
      border-color: var(--primary);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .result-item:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: var(--surface3);
    }

    .result-item .r-num {
      color: var(--text-muted);
      font-size: 0.75rem;
      min-width: 24px;
      font-weight: 600;
    }

    .result-item .r-name {
      flex: 1;
      font-weight: 500;
      color: var(--text);
    }

    .result-item .r-country {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    @media (max-width: 700px) {
      .album-header {
        padding: 10px 14px;
        gap: 8px;
      }

      .header-title {
        font-size: 1.05rem;
      }

      .nav-bar {
        padding: 8px 14px;
      }

      .nav-country h2 {
        font-size: 1.1rem;
      }

      .sticker-grid {
        grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
        gap: 10px;
      }

      .sticker-slot {
        min-height: 115px;
        padding: 10px 6px;
      }

      .slot-icon {
        font-size: 1.8rem;
      }

      .slot-label {
        font-size: 0.68rem;
      }

      .global-bar-wrap {
        padding: 8px 14px;
      }
    }

    @media (max-width: 420px) {
      .sticker-grid {
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
        gap: 8px;
      }

      .sticker-slot {
        min-height: 100px;
        border-radius: 10px;
      }

      .header-user {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-trophy">🏆</div>
    <h1 class="login-title">Álbum Copa 2026</h1>
    <p class="login-sub">Panini Official Sticker Collection</p>
    <div class="login-box">
      <div class="input-wrap">
        <input type="email" id="loginEmail" placeholder="E-mail" autocomplete="email" />
      </div>
      <div class="input-wrap">
        <input type="password" id="loginPass" placeholder="Senha" autocomplete="current-password" />
      </div>
      <div class="login-error" id="loginError"></div>
      <div class="btn-group">
        <button id="loginBtn" class="btn btn-primary">Entrar</button>
        <button id="registerBtn" class="btn btn-secondary">Cadastrar</button>
      </div>
    </div>
  </div>

  <!-- ÁLBUM -->
  <div id="albumScreen">
    <header class="album-header">
      <span class="header-title">🏆 Copa 2026</span>
      <div class="header-user">👤 <strong id="displayUser"></strong></div>
      <div class="header-actions">
        <button id="searchBtn" class="btn btn-secondary btn-sm">🔍 Pesquisar</button>
        <button id="saveBtn" class="btn btn-green">💾 Salvar</button>
        <button class="btn btn-secondary" onclick="location.href='perfil.html'">👤 Perfil</button>
        <button class="btn btn-secondary" onclick="location.href='amigos.html'">👥 Amigos</button>
        <button id="logoutBtn" class="btn btn-secondary">Sair</button>
      </div>
    </header>

    <div class="global-bar-wrap">
      <span class="global-bar-label"><strong id="globalProgress">0</strong> / <span id="totalStickers">0</span>
        figurinhas</span>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressBarFill" style="width:0%"></div>
      </div>
      <span class="global-bar-pct" id="globalPct">0%</span>
    </div>

    <div class="nav-bar">
      <div class="nav-arrows">
        <button class="nav-btn-arrow" id="prevBtn">◀</button>
        <button class="nav-btn-arrow" id="nextBtn">▶</button>
      </div>
      <div class="nav-country">
        <h2 id="countryName"></h2>
        <span class="nav-group-badge" id="groupBadge">A</span>
      </div>
      <div class="nav-right">
        <span class="nav-page"><strong id="pageNum">1</strong> / <span id="totalPages">48</span></span>
        <span class="country-progress-badge" id="countryProgress">0 / 22</span>
      </div>
    </div>

    <div class="sticker-grid" id="stickerGrid"></div>
  </div>

  <!-- Modal de Pesquisa -->
  <div id="searchModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>🔍 Pesquisar Figurinha</h3>
        <button class="modal-close" id="closeSearchModal">✕</button>
      </div>
      <input type="text" class="search-input" id="searchInput" placeholder="Nome do jogador, país ou número..." />
      <div id="searchResults"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDzkmadkh_Bc32ME52RKqCOG6TMP3m5K0s",
      authDomain: "albumcopa2026-d8be9.firebaseapp.com",
      projectId: "albumcopa2026-d8be9",
      storageBucket: "albumcopa2026-d8be9.firebasestorage.app",
      messagingSenderId: "610473055437",
      appId: "1:610473055437:web:3d3493c3580f4cdb2dc584"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentPage = 0;
    let stickerStates = {};
    let dirty = false;
    let isSaving = false;
    let highlightSlot = null;

    const loginScreen = document.getElementById('loginScreen');
    const albumScreen = document.getElementById('albumScreen');
    const loginEmail = document.getElementById('loginEmail');
    const loginPass = document.getElementById('loginPass');
    const loginError = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const saveBtn = document.getElementById('saveBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageNum = document.getElementById('pageNum');
    const totalPagesEl = document.getElementById('totalPages');
    const countryNameEl = document.getElementById('countryName');
    const groupBadgeEl = document.getElementById('groupBadge');
    const countryProgress = document.getElementById('countryProgress');
    const globalProgress = document.getElementById('globalProgress');
    const totalStickers = document.getElementById('totalStickers');
    const progressBarFill = document.getElementById('progressBarFill');
    const globalPct = document.getElementById('globalPct');
    const displayUser = document.getElementById('displayUser');
    const stickerGrid = document.getElementById('stickerGrid');
    const toast = document.getElementById('toast');
    const searchBtn = document.getElementById('searchBtn');
    const searchModal = document.getElementById('searchModal');
    const closeSearchModal = document.getElementById('closeSearchModal');
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');

    let toastTimer;
    function showToast(msg, duration = 2600, type = '') {
      toast.textContent = msg;
      toast.className = 'toast' + (type ? ' ' + type : '');
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    function getCollectedCount(states) {
      let n = 0;
      for (const k in states) if (states[k] === true) n++;
      return n;
    }

    function getCountryCollected(idx, states) {
      const slots = rawCountries[idx].slots || DEFAULT_SLOTS;
      let n = 0;
      for (let s = 0; s < slots; s++) if (states[`${idx}_${s}`] === true) n++;
      return n;
    }

    async function loadFromCloud(uid) {
      try {
        const ref = db.collection('users').doc(uid);
        const doc = await ref.get();
        stickerStates = doc.exists ? (doc.data().stickers || {}) : {};
        if (!doc.exists) await ref.set({ stickers: {} });
        for (let i = 0; i < rawCountries.length; i++) {
          const slots = rawCountries[i].slots || DEFAULT_SLOTS;
          for (let s = 0; s < slots; s++) {
            const key = `${i}_${s}`;
            if (!(key in stickerStates)) stickerStates[key] = false;
          }
        }
        dirty = false;
        return true;
      } catch (err) {
        console.error(err);
        showToast('⚠️ Erro ao carregar dados.', 3500, 'error');
        return false;
      }
    }

    async function saveToCloud() {
      if (!currentUser || isSaving) return;
      isSaving = true;
      saveBtn.disabled = true;
      saveBtn.textContent = '⏳ Salvando...';
      try {
        await db.collection('users').doc(currentUser.uid).set({ stickers: stickerStates }, { merge: true });
        dirty = false;
        saveBtn.classList.remove('dirty');
        showToast('✅ Progresso salvo!', 2000, 'success');
      } catch (err) {
        console.error(err);
        showToast('❌ Falha ao salvar.', 3000, 'error');
      } finally {
        isSaving = false;
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 Salvar';
      }
    }

    function updateUI() {
      const total = getTotalStickers();
      const collected = getCollectedCount(stickerStates);
      const pct = total > 0 ? Math.round(collected / total * 100) : 0;
      globalProgress.textContent = collected;
      totalStickers.textContent = total;
      progressBarFill.style.width = pct + '%';
      globalPct.textContent = pct + '%';

      const page = rawCountries[currentPage];
      const slots = page.slots || DEFAULT_SLOTS;
      const cCount = getCountryCollected(currentPage, stickerStates);
      countryNameEl.textContent = page.name;
      groupBadgeEl.textContent = 'Grupo ' + page.group;
      countryProgress.textContent = `${cCount} / ${slots}`;
      countryProgress.className = 'country-progress-badge' + (cCount === slots ? ' done' : '');
      pageNum.textContent = currentPage + 1;
      totalPagesEl.textContent = rawCountries.length;
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === rawCountries.length - 1;

      stickerGrid.innerHTML = '';
      for (let s = 0; s < slots; s++) {
        const key = `${currentPage}_${s}`;
        const isCollected = stickerStates[key] === true;
        const slot = document.createElement('div');
        slot.className = 'sticker-slot ' + (isCollected ? 'collected' : 'empty');
        if (highlightSlot && highlightSlot.countryIdx === currentPage && highlightSlot.slotIdx === s) {
          slot.classList.add('highlight');
        }

        let icon = '', label = '', number = '';
        if (!page.special) {
          if (s === SHIELD_SLOT) { icon = '🛡️'; label = 'Escudo'; number = '1'; }
          else if (s === TEAM_SLOT) { icon = '👥'; label = 'Seleção'; number = '13'; }
          else {
            const pi = s - FIRST_PLAYER_SLOT;
            if (pi < page.players.length) {
              label = page.players[pi];
              number = s < 13 ? String(s) : String(s + 1);
              icon = isCollected ? '✅' : '⚽';
            } else {
              slot.style.opacity = '0.3'; slot.style.cursor = 'default';
              stickerGrid.appendChild(slot); continue;
            }
          }
        } else {
          const item = page.players[s];
          if (typeof item === 'string') { label = item; number = s + 1; }
          else { label = item.name; number = item.code; }
          icon = isCollected ? '✅' : '⚽';
        }

        slot.innerHTML = `
        <span class="slot-number">${number}</span>
        <span class="slot-icon">${icon}</span>
        <span class="slot-label" title="${label}">${label}</span>
      `;
        slot.addEventListener('click', () => {
          if (isSaving || !label) return;
          stickerStates[key] = !stickerStates[key];
          dirty = true;
          saveBtn.classList.add('dirty');
          slot.classList.remove('pop'); void slot.offsetWidth; slot.classList.add('pop');
          updateUI();
        });
        stickerGrid.appendChild(slot);
      }

      if (highlightSlot) {
        setTimeout(() => { highlightSlot = null; updateUI(); }, 4000);
      }
    }

    function goToPage(p) {
      if (p < 0 || p >= rawCountries.length) return;
      if (dirty) { showToast('⚠️ Salve antes de mudar de página', 2500, 'error'); return; }
      currentPage = p;
      updateUI();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Pesquisa
    searchBtn.addEventListener('click', () => {
      searchModal.classList.remove('hidden');
      searchInput.value = '';
      searchResults.innerHTML = '';
      setTimeout(() => searchInput.focus(), 100);
    });
    closeSearchModal.addEventListener('click', () => searchModal.classList.add('hidden'));
    searchModal.addEventListener('click', (e) => { if (e.target === searchModal) searchModal.classList.add('hidden'); });

    let searchTimeout;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      const q = searchInput.value.trim();
      if (q.length < 2) { searchResults.innerHTML = ''; return; }
      searchResults.innerHTML = '<p style="color:var(--text-muted); padding:10px;">Buscando...</p>';
      searchTimeout = setTimeout(() => {
        const results = searchAllStickers(q);
        searchResults.innerHTML = '';
        if (results.length === 0) {
          searchResults.innerHTML = '<p style="color:var(--text-muted); padding:10px;">Nenhum resultado.</p>';
          return;
        }
        results.forEach(r => {
          const div = document.createElement('div');
          div.className = 'result-item';
          div.innerHTML = `<span class="r-num">${r.number}</span><span class="r-name">${r.label}</span><span class="r-country">${r.country} (${r.group})</span>`;
          div.addEventListener('click', () => {
            searchModal.classList.add('hidden');
            highlightSlot = { countryIdx: r.countryIdx, slotIdx: r.slotIdx };
            currentPage = r.countryIdx;
            updateUI();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
          searchResults.appendChild(div);
        });
      }, 300);
    });

    // Auth
    async function doLogin() {
      const email = loginEmail.value.trim();
      const pass = loginPass.value.trim();
      if (!email || !pass) { setError('Preencha e-mail e senha.'); return; }
      setError('Entrando...', false);
      try {
        const { user } = await auth.signInWithEmailAndPassword(email, pass);
        await handleLoginSuccess(user);
      } catch (err) { setError(friendlyError(err)); }
    }
    async function doRegister() {
      const email = loginEmail.value.trim();
      const pass = loginPass.value.trim();
      if (!email || !pass) { setError('Preencha todos os campos.'); return; }
      if (pass.length < 6) { setError('Senha deve ter pelo menos 6 caracteres.'); return; }
      setError('Criando conta...', false);
      try {
        const { user } = await auth.createUserWithEmailAndPassword(email, pass);
        setError('✅ Conta criada! Entrando...', true);
        await handleLoginSuccess(user);
      } catch (err) { setError(friendlyError(err)); }
    }
    async function handleLoginSuccess(user) {
      currentUser = user;
      displayUser.textContent = user.email;
      loginScreen.style.display = 'none';
      albumScreen.style.display = 'flex';
      const ok = await loadFromCloud(user.uid);
      if (ok) {
        currentPage = 0;
        updateUI();
        showToast(`👋 Bem-vindo(a)!`, 2000, 'success');
      }
    }
    function doLogout() {
      if (dirty && !confirm('Alterações não salvas. Sair?')) return;
      auth.signOut().then(() => {
        currentUser = null; stickerStates = {}; dirty = false;
        albumScreen.style.display = 'none'; loginScreen.style.display = 'flex';
        loginError.textContent = ''; loginError.className = 'login-error';
        loginEmail.value = ''; loginPass.value = '';
      });
    }
    function setError(msg, isError = true) {
      loginError.textContent = msg;
      loginError.className = 'login-error' + (isError ? '' : ' ok');
    }
    function friendlyError(err) {
      const code = err.code || '';
      if (code.includes('user-not-found') || code.includes('wrong-password') || code.includes('invalid-credential')) return 'E-mail ou senha incorretos.';
      if (code.includes('email-already-in-use')) return 'E-mail já cadastrado.';
      if (code.includes('invalid-email')) return 'E-mail inválido.';
      if (code.includes('network')) return 'Sem conexão.';
      return err.message || 'Erro ao entrar.';
    }

    loginBtn.addEventListener('click', doLogin);
    registerBtn.addEventListener('click', doRegister);
    loginEmail.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); loginPass.focus(); } });
    loginPass.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doLogin(); } });
    logoutBtn.addEventListener('click', doLogout);
    saveBtn.addEventListener('click', saveToCloud);
    prevBtn.addEventListener('click', () => goToPage(currentPage - 1));
    nextBtn.addEventListener('click', () => goToPage(currentPage + 1));

    document.addEventListener('keydown', e => {
      if (albumScreen.style.display !== 'flex') return;
      if (e.key === 'ArrowLeft') { e.preventDefault(); goToPage(currentPage - 1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); goToPage(currentPage + 1); }
      if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveToCloud(); }
    });
    window.addEventListener('beforeunload', e => { if (dirty) { e.preventDefault(); e.returnValue = ''; } });

    totalStickers.textContent = getTotalStickers();
    auth.onAuthStateChanged(async user => {
      if (user && albumScreen.style.display !== 'flex') {
        await handleLoginSuccess(user);
      } else if (!user) {
        loginScreen.style.display = 'flex';
        albumScreen.style.display = 'none';
      }
    });
  </script>
</body>

</html>
