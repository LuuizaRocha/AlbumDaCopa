<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <title>Álbum Copa 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap"
        rel="stylesheet" />

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0d14;
            --surface: #131721;
            --surface2: #1c2230;
            --primary: #f7d44a;
            --primary-dark: #d4b13b;
            --text: #f0f2f5;
            --text-secondary: #a0a8b8;
            --green: #2ecc71;
            --green-dark: #27ae60;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background-image: radial-gradient(ellipse at top left, #1a2332 0%, #0b0d14 100%);
        }

        .app-container {
            width: 100%;
            max-width: 1300px;
            background: rgba(19, 23, 33, 0.85);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            box-shadow: var(--shadow), 0 0 0 1px rgba(255, 255, 255, 0.03);
            padding: 20px 24px 32px;
            position: relative;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 24px;
            padding: 40px 20px;
        }

        #loginScreen h1 {
            font-size: 2.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #f0b34b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 0 40px rgba(247, 212, 74, 0.15);
        }

        #loginScreen .sub {
            color: var(--text-secondary);
            font-size: 1rem;
            letter-spacing: 1px;
            font-weight: 300;
        }

        .login-box {
            background: rgba(28, 34, 48, 0.7);
            backdrop-filter: blur(8px);
            padding: 32px 28px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .login-box input {
            background: rgba(11, 13, 20, 0.7);
            border: 1px solid #2a3345;
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }

        .login-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(247, 212, 74, 0.1);
        }

        .login-box .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .login-box .btn-group button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #0b0d14;
            box-shadow: 0 4px 12px rgba(247, 212, 74, 0.2);
        }

        .login-box .btn-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(247, 212, 74, 0.3);
        }

        .login-box .btn-group button.secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid #3a4155;
            box-shadow: none;
        }

        .login-box .btn-group button.secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-secondary);
            transform: translateY(-2px);
        }

        .login-error {
            color: #e74c3c;
            font-size: 0.9rem;
            text-align: center;
            min-height: 24px;
            font-weight: 500;
        }

        .login-error.success {
            color: var(--green);
        }

        #albumScreen {
            display: none;
            flex: 1;
            flex-direction: column;
            gap: 18px;
        }

        .album-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .album-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #f0b34b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .album-header .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .album-header .user-info span {
            color: var(--text);
            font-weight: 600;
        }

        .album-header .actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .album-header .actions button {
            padding: 8px 18px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #0b0d14;
            box-shadow: 0 4px 12px rgba(247, 212, 74, 0.15);
        }

        .album-header .actions button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(247, 212, 74, 0.25);
        }

        .album-header .actions button.save-btn {
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: #0b0d14;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }

        .album-header .actions button.save-btn:hover {
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.3);
        }

        .album-header .actions button.logout-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid #3a4155;
            box-shadow: none;
        }

        .album-header .actions button.logout-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-secondary);
        }

        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            background: rgba(28, 34, 48, 0.5);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-bar button {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 40px;
            transition: var(--transition);
            line-height: 1;
        }

        .nav-bar button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--primary);
        }

        .nav-bar .page-info {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .nav-bar .page-info strong {
            color: var(--text);
        }

        .country-header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px;
            margin-top: 4px;
        }

        .country-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a0a8b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .country-header .progress {
            font-size: 0.95rem;
            color: var(--text-secondary);
            background: rgba(28, 34, 48, 0.6);
            backdrop-filter: blur(4px);
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .country-header .progress strong {
            color: var(--text);
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
            margin-top: 16px;
            flex: 1;
        }

        .sticker-slot {
            background: rgba(28, 34, 48, 0.6);
            backdrop-filter: blur(4px);
            border-radius: var(--radius);
            aspect-ratio: 130 / 180;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 10px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            user-select: none;
            min-height: 150px;
            gap: 6px;
        }

        .sticker-slot::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .sticker-slot:hover {
            transform: translateY(-6px) scale(1.03);
            border-color: var(--primary);
            box-shadow: 0 12px 32px rgba(247, 212, 74, 0.15);
        }

        .sticker-slot .slot-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 4px;
        }

        .sticker-slot .slot-icon {
            font-size: 2.6rem;
            line-height: 1;
            transition: var(--transition);
        }

        .sticker-slot .slot-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.3;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
        }

        .sticker-slot .slot-number {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-top: 2px;
            opacity: 0.7;
        }

        .sticker-slot.empty .slot-icon {
            opacity: 0.3;
            font-size: 3rem;
        }

        .sticker-slot.empty .slot-number {
            opacity: 0.4;
        }

        .sticker-slot.collected {
            background: rgba(30, 58, 42, 0.7);
            border-color: var(--green);
            box-shadow: 0 0 0 1px rgba(46, 204, 113, 0.3), 0 8px 24px rgba(46, 204, 113, 0.1);
        }

        .sticker-slot.collected .slot-icon {
            color: var(--green);
            font-size: 2.6rem;
        }

        .sticker-slot.collected .slot-label {
            color: #a0e0b0;
        }

        .sticker-slot.collected .slot-number {
            color: #a0e0b0;
            opacity: 0.9;
        }

        .sticker-slot.pop {
            animation: pop 0.35s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0.9);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        .global-progress {
            margin-top: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: center;
            background: rgba(28, 34, 48, 0.3);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: inline-block;
            align-self: center;
        }

        .global-progress strong {
            color: var(--text);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(231, 76, 60, 0.9);
            backdrop-filter: blur(8px);
            color: #fff;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            text-align: center;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toast.show {
            opacity: 1;
        }

        .toast.success {
            background: rgba(46, 204, 113, 0.9);
        }

        @media (max-width: 640px) {
            .app-container {
                padding: 12px;
                border-radius: 12px;
            }

            .album-header h1 {
                font-size: 1.2rem;
            }

            .album-header .user-info {
                font-size: 0.75rem;
            }

            .album-header .actions button {
                padding: 6px 12px;
                font-size: 0.75rem;
            }

            .nav-bar {
                padding: 4px 10px;
            }

            .nav-bar button {
                font-size: 1.2rem;
                padding: 4px 8px;
            }

            .country-header h2 {
                font-size: 1.4rem;
            }

            .sticker-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 14px;
            }

            .sticker-slot {
                min-height: 130px;
                padding: 12px 6px;
                aspect-ratio: 100 / 150;
            }

            .sticker-slot .slot-icon {
                font-size: 2rem;
            }

            .sticker-slot .slot-label {
                font-size: 0.7rem;
            }

            .sticker-slot .slot-number {
                font-size: 0.65rem;
            }

            .login-box {
                padding: 24px 16px;
            }

            #loginScreen h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 400px) {
            .sticker-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 10px;
            }

            .sticker-slot {
                min-height: 110px;
                border-radius: 10px;
            }
        }
    </style>
</head>

        // ============================================================
        // CONFIGURAÇÕES
        // ============================================================
        const DEFAULT_SLOTS = 22;
        const SHIELD_SLOT = 0;
        const TEAM_SLOT = 1;
        const FIRST_PLAYER_SLOT = 2;

        // ============================================================
        // ESTADO GLOBAL
        // ============================================================
        let currentUser = null;        // objeto do Firebase (firebase.User)
        let currentPage = 0;
        let stickerStates = {};        // chave: "indicePagina_indiceSlot" => boolean
        let dirty = false;
        let isSaving = false;

        // DOM refs
        const loginScreen = document.getElementById('loginScreen');
        const albumScreen = document.getElementById('albumScreen');
        const loginEmail = document.getElementById('loginEmail');
        const loginPass = document.getElementById('loginPass');
        const loginError = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const saveBtn = document.getElementById('saveBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageNum = document.getElementById('pageNum');
        const totalPages = document.getElementById('totalPages');
        const countryName = document.getElementById('countryName');
        const countryProgress = document.getElementById('countryProgress');
        const globalProgress = document.getElementById('globalProgress');
        const totalStickers = document.getElementById('totalStickers');
        const displayUser = document.getElementById('displayUser');
        const stickerGrid = document.getElementById('stickerGrid');
        const toast = document.getElementById('toast');

        // ============================================================
        // FUNÇÕES AUXILIARES (toast, progresso, etc.)
        // ============================================================
        function showToast(msg, duration = 2500, type = '') {
            toast.textContent = msg;
            toast.className = 'toast' + (type ? ' ' + type : '');
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
        }

        function getTotalStickers() {
            let total = 0;
            for (const page of rawCountries) {
                total += page.slots || DEFAULT_SLOTS;
            }
            return total;
        }

        function getCollectedCount(states) {
            let count = 0;
            for (const key in states) {
                if (states[key] === true) count++;
            }
            return count;
        }

        function getCountryCollectedCount(idx, states) {
            const page = rawCountries[idx];
            const slots = page.slots || DEFAULT_SLOTS;
            let count = 0;
            for (let s = 0; s < slots; s++) {
                const key = `${idx}_${s}`;
                if (states[key] === true) count++;
            }
            return count;
        }

        // ============================================================
        // SINCRONIZAÇÃO COM FIRESTORE
        // ============================================================
        async function loadProgressFromCloud(uid) {
            try {
                const docRef = db.collection('users').doc(uid);
                const doc = await docRef.get();
                if (doc.exists) {
                    const data = doc.data();
                    stickerStates = data.stickers || {};
                } else {
                    stickerStates = {};
                    await docRef.set({ stickers: {} });
                }
                // garante que todos os slots existam
                for (let i = 0; i < rawCountries.length; i++) {
                    const slots = rawCountries[i].slots || DEFAULT_SLOTS;
                    for (let s = 0; s < slots; s++) {
                        const key = `${i}_${s}`;
                        if (!(key in stickerStates)) stickerStates[key] = false;
                    }
                }
                dirty = false;
                return true;
            } catch (err) {
                showToast('Erro ao carregar dados da nuvem. Verifique sua conexão.', 3000);
                console.error(err);
                return false;
            }
        }

        async function saveProgressToCloud() {
            if (!currentUser) return;
            try {
                const docRef = db.collection('users').doc(currentUser.uid);
                await docRef.set({ stickers: stickerStates }, { merge: true });
                dirty = false;
                isSaving = false;
                updateUI();
                showToast('✅ Progresso salvo na nuvem!', 1800, 'success');
            } catch (err) {
                showToast('Erro ao salvar. Tente novamente.', 3000);
                console.error(err);
                isSaving = false;
            }
        }

        // ============================================================
        // RENDERIZAÇÃO (idêntica à original, apenas chama updateUI)
        // ============================================================
        function updateUI() {
            const total = getTotalStickers();
            const collected = getCollectedCount(stickerStates);
            globalProgress.textContent = collected;
            totalStickers.textContent = total;

            const idx = currentPage;
            const page = rawCountries[idx];
            const slots = page.slots || DEFAULT_SLOTS;
            countryName.textContent = `${page.name} (Grupo ${page.group})`;
            const cCollected = getCountryCollectedCount(idx, stickerStates);
            countryProgress.textContent = `${cCollected} / ${slots}`;

            pageNum.textContent = idx + 1;
            totalPages.textContent = rawCountries.length;

            stickerGrid.innerHTML = '';
            for (let s = 0; s < slots; s++) {
                const slot = document.createElement('div');
                slot.className = 'sticker-slot';
                const key = `${idx}_${s}`;
                const isCollected = stickerStates[key] === true;

                if (isCollected) {
                    slot.classList.add('collected');
                } else {
                    slot.classList.add('empty');
                }

                const content = document.createElement('div');
                content.className = 'slot-content';

                let icon = '';
                let label = '';
                let number = '';

                if (!page.special) {
                    if (s === SHIELD_SLOT) {
                        icon = '🛡️';
                        label = `Escudo ${page.name}`;
                        number = '1';
                    } else if (s === TEAM_SLOT) {
                        icon = '👥';
                        label = `Time ${page.name}`;
                        number = '13';
                    } else {
                        const playerIdx = s - FIRST_PLAYER_SLOT;
                        if (playerIdx < page.players.length) {
                            label = page.players[playerIdx];
                            if (s < 13) {
                                number = s;
                            } else {
                                number = s + 1;
                            }
                        } else {
                            label = '';
                            number = '';
                            icon = '—';
                        }
                        if (!icon) icon = isCollected ? '✅' : '➕';
                    }
                } else {
                    const item = page.players[s];
                    if (typeof item === 'string') {
                        label = item;
                        number = s + 1;
                    } else {
                        label = item.name;
                        number = item.code;
                    }
                    icon = isCollected ? '✅' : '➕';
                }

                const iconSpan = document.createElement('span');
                iconSpan.className = 'slot-icon';
                iconSpan.textContent = icon;

                const labelSpan = document.createElement('span');
                labelSpan.className = 'slot-label';
                labelSpan.textContent = label;

                const numSpan = document.createElement('span');
                numSpan.className = 'slot-number';
                numSpan.textContent = number;

                content.appendChild(iconSpan);
                content.appendChild(labelSpan);
                if (number !== '') content.appendChild(numSpan);
                slot.appendChild(content);

                slot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (isSaving) return;
                    if (label === '' && number === '') return;
                    const newState = !isCollected;
                    stickerStates[key] = newState;
                    dirty = true;
                    slot.classList.remove('pop');
                    void slot.offsetWidth;
                    slot.classList.add('pop');
                    updateUI();
                });

                stickerGrid.appendChild(slot);
            }
        }

        // ============================================================
        // NAVEGAÇÃO
        // ============================================================
        function goToPage(page) {
            if (dirty) {
                showToast('⚠️ Você tem alterações não salvas! Salve antes de mudar de página.', 3000);
                return;
            }
            if (page < 0) page = 0;
            if (page >= rawCountries.length) page = rawCountries.length - 1;
            currentPage = page;
            updateUI();
        }

        // ============================================================
        // AUTENTICAÇÃO (Firebase)
        // ============================================================
        async function doLogin() {
            const email = loginEmail.value.trim();
            const password = loginPass.value.trim();
            if (!email || !password) {
                loginError.textContent = 'Preencha e‑mail e senha.';
                loginError.className = 'login-error';
                return;
            }
            loginError.textContent = 'Entrando...';
            loginError.className = 'login-error';
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                await handleLoginSuccess(userCredential.user);
            } catch (err) {
                loginError.textContent = 'Erro ao entrar: ' + (err.message || 'Credenciais inválidas.');
                loginError.className = 'login-error';
            }
        }

        async function doRegister() {
            const email = loginEmail.value.trim();
            const password = loginPass.value.trim();
            if (!email || !password) {
                loginError.textContent = 'Preencha todos os campos.';
                loginError.className = 'login-error';
                return;
            }
            loginError.textContent = 'Criando conta...';
            loginError.className = 'login-error';
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                loginError.textContent = '✅ Conta criada! Entrando...';
                loginError.className = 'login-error success';
                await handleLoginSuccess(userCredential.user);
            } catch (err) {
                loginError.textContent = 'Erro ao cadastrar: ' + (err.message || 'Tente outro e‑mail.');
                loginError.className = 'login-error';
            }
        }

        async function handleLoginSuccess(user) {
            currentUser = user;
            displayUser.textContent = user.email;
            loginScreen.style.display = 'none';
            albumScreen.style.display = 'flex';
            // Carrega dados da nuvem
            const ok = await loadProgressFromCloud(user.uid);
            if (ok) {
                currentPage = 0;
                updateUI();
                showToast(`👋 Bem‑vindo(a), ${user.email}!`, 2000, 'success');
            } else {
                // se falhar, mantém localStorage? opcional, aqui vamos mostrar erro mas deixar entrar com localStorage antigo (não implementado)
                showToast('Não foi possível carregar seus dados. Verifique a conexão.', 3000);
            }
        }

        function doLogout() {
            if (dirty) {
                if (!confirm('Você tem alterações não salvas. Deseja sair sem salvar?')) {
                    return;
                }
            }
            auth.signOut().then(() => {
                currentUser = null;
                stickerStates = {};
                dirty = false;
                albumScreen.style.display = 'none';
                loginScreen.style.display = 'flex';
                loginError.textContent = '';
                loginError.className = 'login-error';
                loginEmail.value = '';
                loginPass.value = '';
                loginEmail.focus();
            }).catch(err => {
                showToast('Erro ao sair.', 2000);
            });
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        loginBtn.addEventListener('click', doLogin);
        registerBtn.addEventListener('click', doRegister);
        loginEmail.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); loginPass.focus(); } });
        loginPass.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); doLogin(); } });
        logoutBtn.addEventListener('click', doLogout);
        saveBtn.addEventListener('click', () => {
            if (!currentUser) return;
            isSaving = true;
            saveProgressToCloud();
        });
        prevBtn.addEventListener('click', () => goToPage(currentPage - 1));
        nextBtn.addEventListener('click', () => goToPage(currentPage + 1));

        document.addEventListener('keydown', (e) => {
            if (albumScreen.style.display !== 'flex') return;
            if (e.key === 'ArrowLeft') { e.preventDefault(); goToPage(currentPage - 1); }
            if (e.key === 'ArrowRight') { e.preventDefault(); goToPage(currentPage + 1); }
            if (e.key === 's' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); saveBtn.click(); }
        });

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        loginScreen.style.display = 'flex';
        albumScreen.style.display = 'none';
        totalStickers.textContent = getTotalStickers();
        updateUI();

        // Verifica se já existe um usuário logado (persistência de sessão)
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // Já estava logado
                if (albumScreen.style.display === 'none') {
                    await handleLoginSuccess(user);
                }
            } else {
                // Ninguém logado, mostra tela de login
                loginScreen.style.display = 'flex';
                albumScreen.style.display = 'none';
            }
        });

        // Aviso ao fechar página se houver alterações não salvas
        window.addEventListener('beforeunload', (e) => {
            if (dirty) {
                e.preventDefault();
                e.returnValue = 'Você tem alterações não salvas. Tem certeza?';
                return e.returnValue;
            }
        });

        console.log('🏆 Álbum Copa 2026 com Firebase carregado!');
        console.log(`📦 ${rawCountries.length} páginas, ${getTotalStickers()} figurinhas.`);
    </script>
</body>
