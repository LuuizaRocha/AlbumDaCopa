<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil — Álbum Copa 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="dados.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#080a10; --surface:#10141f; --surface2:#171d2d; --surface3:#1f2840;
      --border:rgba(255,255,255,0.07); --primary:#f7d44a; --primary-dark:#c9a92e;
      --primary-glow:rgba(247,212,74,0.15); --green:#2ecc71; --green-dark:#25a85d;
      --green-glow:rgba(46,204,113,0.15); --red:#e74c3c;
      --text:#edf0f7; --text-secondary:#8892aa; --text-muted:#535e78;
      --radius-sm:10px; --radius:14px; --radius-lg:20px;
      --shadow:0 8px 40px rgba(0,0,0,0.7); --ease:cubic-bezier(0.4,0,0.2,1);
    }
    body {
      font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
      min-height:100vh; padding:20px; display:flex; justify-content:center;
      background-image: radial-gradient(ellipse 80% 50% at 10% 0%, rgba(247,212,74,0.04) 0%, transparent 60%);
    }
    .container {
      width:100%; max-width:920px; display:flex; flex-direction:column; gap:16px;
    }

    .top-bar {
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
      padding:12px 18px;
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    }
    .top-bar-title {
      font-size:1.1rem; font-weight:700;
      background:linear-gradient(135deg, var(--primary), #f0b34b);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .top-bar-actions { margin-left:auto; display:flex; gap:8px; }

    .btn {
      padding:9px 18px; border:none; border-radius:var(--radius-sm);
      font-weight:600; font-size:0.85rem; cursor:pointer;
      transition:transform 0.15s var(--ease), box-shadow 0.15s, opacity 0.15s;
      font-family:inherit; white-space:nowrap;
    }
    .btn:active { transform:scale(0.96)!important; }
    .btn-primary {
      background:linear-gradient(135deg, var(--primary), var(--primary-dark));
      color:#0a0c14; box-shadow:0 4px 16px var(--primary-glow);
    }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(247,212,74,0.3); }
    .btn-secondary {
      background:transparent; color:var(--text-secondary);
      border:1px solid rgba(255,255,255,0.12);
    }
    .btn-secondary:hover { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.2); transform:translateY(-2px); }

    .profile-card {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
      padding:28px; display:flex; gap:24px; align-items:center; flex-wrap:wrap;
    }
    .avatar-wrap {
      width:100px; height:100px; border-radius:50%; flex-shrink:0;
      border:3px solid var(--primary); overflow:hidden;
      background:var(--surface2); display:flex; align-items:center; justify-content:center;
      font-size:2.8rem; box-shadow:0 0 0 4px var(--primary-glow);
    }
    .avatar-wrap img { width:100%; height:100%; object-fit:cover; }

    .profile-info { flex:1; min-width:180px; }
    .profile-info h2 { font-size:1.6rem; font-weight:700; margin-bottom:4px; }
    .profile-email { color:var(--text-secondary); font-size:0.85rem; margin-bottom:16px; }

    .stats-row {
      display:flex; gap:12px; flex-wrap:wrap;
    }
    .stat-box {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:16px 20px; text-align:center; flex:1; min-width:120px;
    }
    .stat-value { font-size:1.8rem; font-weight:700; color:var(--primary); }
    .stat-label { font-size:0.78rem; color:var(--text-secondary); margin-top:2px; }

    .section-title { font-size:1rem; font-weight:700; color:var(--text); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .section-count {
      font-size:0.72rem; font-weight:600; color:var(--text-secondary);
      background:var(--surface2); border:1px solid var(--border);
      padding:2px 8px; border-radius:20px;
    }

    .missing-grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:10px;
    }
    .missing-slot {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius-sm); padding:10px 14px;
      font-size:0.82rem; color:var(--text-secondary);
      display:flex; align-items:center; gap:8px;
    }
    .missing-slot .num {
      font-weight:700; color:var(--text-muted); font-size:0.72rem;
      min-width:22px;
    }
    .missing-slot .name { color:var(--text); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .missing-slot .country { font-size:0.72rem; color:var(--text-muted); margin-left:auto; flex-shrink:0; }

    .empty-state { text-align:center; padding:40px; color:var(--text-secondary); }
    .empty-state .icon { font-size:3rem; margin-bottom:12px; }

    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.75);
      backdrop-filter:blur(10px); display:flex; align-items:center;
      justify-content:center; z-index:1000;
    }
    .modal {
      background:var(--surface2); border:1px solid var(--border);
      border-radius:var(--radius-lg); padding:28px; width:90%; max-width:400px;
      box-shadow:var(--shadow);
    }
    .modal h3 { font-size:1.1rem; font-weight:700; margin-bottom:16px; }
    .modal-field { margin-bottom:12px; }
    .modal-field label { display:block; font-size:0.8rem; color:var(--text-secondary); margin-bottom:6px; }
    .modal-field input {
      width:100%; padding:11px 14px; background:var(--surface);
      border:1px solid rgba(255,255,255,0.1); color:var(--text);
      border-radius:var(--radius-sm); font-family:inherit; font-size:0.9rem; outline:none;
      transition:border-color 0.2s;
    }
    .modal-field input:focus { border-color:var(--primary); }
    .modal-field input[type="file"] { color:var(--text-secondary); }
    .modal-hint { font-size:0.75rem; color:var(--text-muted); margin-top:4px; }
    .modal-actions { display:flex; gap:10px; margin-top:20px; }
    .modal-error { font-size:0.85rem; color:var(--red); margin-top:8px; min-height:20px; }

    .toast {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px);
      background:rgba(15,20,35,0.95); backdrop-filter:blur(16px); color:var(--text);
      padding:11px 24px; border-radius:40px; font-weight:600; font-size:0.9rem;
      box-shadow:0 8px 32px rgba(0,0,0,0.5); z-index:2000;
      opacity:0; transition:opacity 0.25s, transform 0.25s var(--ease);
      pointer-events:none; border:1px solid rgba(255,255,255,0.1);
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .hidden { display:none!important; }
  </style>
</head>
<body>
<div class="container">

  <!-- Top bar -->
  <div class="top-bar">
    <span class="top-bar-title">👤 <span id="profileType">Meu Perfil</span></span>
    <div class="top-bar-actions">
      <button class="btn btn-secondary" onclick="location.href='index.html'">← Álbum</button>
      <button class="btn btn-secondary" onclick="location.href='amigos.html'">👥 Amigos</button>
      <button class="btn btn-secondary" id="logoutBtnP">Sair</button>
    </div>
  </div>

  <!-- Profile card -->
  <div class="profile-card">
    <div class="avatar-wrap" id="avatarWrap">👤</div>
    <div class="profile-info">
      <h2 id="usernameDisplay">Carregando...</h2>
      <p class="profile-email" id="emailDisplay"></p>
      <button class="btn btn-primary hidden" id="editProfileBtn">✏️ Editar Perfil</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-box">
      <div class="stat-value" id="statCollected">—</div>
      <div class="stat-label">Figurinhas coladas</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="statMissing">—</div>
      <div class="stat-label">Faltando</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="statPct">—</div>
      <div class="stat-label">Completo</div>
    </div>
  </div>

  <!-- Missing stickers -->
  <div>
    <div class="section-title">
      🎯 Figurinhas que faltam
      <span class="section-count" id="missingCount">0</span>
    </div>
    <div class="missing-grid" id="missingGrid">
      <div class="empty-state"><div class="icon">⏳</div><p>Carregando...</p></div>
    </div>
  </div>
</div>

<!-- Modal de edição (só aparece se for o próprio perfil) -->
<div id="editModal" class="modal-overlay hidden">
  <div class="modal">
    <h3>✏️ Editar Perfil</h3>
    <div class="modal-field">
      <label>Nome de usuário</label>
      <input type="text" id="usernameInput" placeholder="Seu nome único" maxlength="30" />
    </div>
    <div class="modal-field">
      <label>Foto de perfil</label>
      <input type="file" id="photoInput" accept="image/*" />
      <p class="modal-hint">Tamanho máximo: 200 KB.</p>
    </div>
    <div class="modal-error" id="editError"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="saveProfileBtn" style="flex:1">Salvar</button>
      <button class="btn btn-secondary" id="cancelEditBtn">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDzkmadkh_Bc32ME52RKqCOG6TMP3m5K0s",
    authDomain: "albumcopa2026-d8be9.firebaseapp.com",
    projectId: "albumcopa2026-d8be9",
    storageBucket: "albumcopa2026-d8be9.firebasestorage.app",
    messagingSenderId: "610473055437",
    appId: "1:610473055437:web:3d3493c3580f4cdb2dc584"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  let currentUser = null;
  let isOwner = true;
  let profileUid = null;
  let currentUsername = '';
  let currentPhotoBase64 = '';
  let toastTimer;

  function showToast(msg, type = '') {
    const t = document.getElementById('toastEl');
    t.textContent = msg;
    t.className = 'toast' + (type ? ' ' + type : '');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
  }

  // Verifica se há uid na URL
  const urlParams = new URLSearchParams(window.location.search);
  const paramUid = urlParams.get('uid');

  auth.onAuthStateChanged(async (user) => {
    if (!user) { location.href = 'index.html'; return; }
    currentUser = user;

    document.getElementById('logoutBtnP').addEventListener('click', () =>
      auth.signOut().then(() => location.href = 'index.html')
    );

    if (paramUid && paramUid !== user.uid) {
      // Visualizando perfil de outro usuário
      isOwner = false;
      profileUid = paramUid;
      document.getElementById('profileType').textContent = 'Perfil do Amigo';
      document.getElementById('emailDisplay').style.display = 'none';
      document.getElementById('editProfileBtn').classList.add('hidden');
      await loadProfile(profileUid);
      await loadMissingStickers(profileUid);
    } else {
      // Próprio perfil
      isOwner = true;
      profileUid = user.uid;
      document.getElementById('profileType').textContent = 'Meu Perfil';
      document.getElementById('editProfileBtn').classList.remove('hidden');
      document.getElementById('emailDisplay').textContent = user.email;
      await loadProfile(user.uid);
      await loadMissingStickers(user.uid);
    }
  });

  async function loadProfile(uid) {
    const doc = await db.collection('users').doc(uid).get();
    const data = doc.exists ? doc.data() : {};
    currentUsername = data.username || '';
    currentPhotoBase64 = data.photoBase64 || '';

    document.getElementById('usernameDisplay').textContent = currentUsername || 'Usuário sem nome';
    setAvatar(currentPhotoBase64);
    if (isOwner) {
      document.getElementById('emailDisplay').textContent = currentUser.email;
    } else {
      document.getElementById('emailDisplay').textContent = '';
    }
  }

  function setAvatar(base64) {
    const wrap = document.getElementById('avatarWrap');
    if (base64) {
      wrap.innerHTML = `<img src="${base64}" alt="Foto de perfil" />`;
    } else {
      wrap.innerHTML = '👤';
    }
  }

  async function loadMissingStickers(uid) {
    const doc = await db.collection('users').doc(uid).get();
    const stickers = doc.exists ? (doc.data().stickers || {}) : {};
    const total = getTotalStickers();
    let collected = 0;
    for (const k in stickers) if (stickers[k] === true) collected++;
    const missing = total - collected;
    const pct = total > 0 ? Math.round(collected / total * 100) : 0;

    document.getElementById('statCollected').textContent = collected;
    document.getElementById('statMissing').textContent = missing;
    document.getElementById('statPct').textContent = pct + '%';

    const grid = document.getElementById('missingGrid');
    const countEl = document.getElementById('missingCount');
    grid.innerHTML = '';

    const items = [];
    for (let i = 0; i < rawCountries.length; i++) {
      const page = rawCountries[i];
      const slots = page.slots || DEFAULT_SLOTS;
      for (let s = 0; s < slots; s++) {
        const key = `${i}_${s}`;
        if (!stickers[key]) {
          const label = getStickerLabel(i, s);
          if (!label) continue;
          items.push({ number: getStickerNumber(i, s), label, country: page.name });
        }
      }
    }

    countEl.textContent = items.length;

    if (items.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">🏆</div><p>Álbum completo! Parabéns!</p></div>';
      return;
    }

    items.forEach(({ number, label, country }) => {
      const div = document.createElement('div');
      div.className = 'missing-slot';
      div.innerHTML = `<span class="num">${number}</span><span class="name" title="${label}">${label}</span><span class="country">${country}</span>`;
      grid.appendChild(div);
    });
  }

  // --- Edição (apenas se for o dono) ---
  document.getElementById('editProfileBtn').addEventListener('click', () => {
    if (!isOwner) return;
    document.getElementById('usernameInput').value = currentUsername;
    document.getElementById('photoInput').value = '';
    document.getElementById('editError').textContent = '';
    document.getElementById('editModal').classList.remove('hidden');
  });

  document.getElementById('cancelEditBtn').addEventListener('click', () => {
    document.getElementById('editModal').classList.add('hidden');
  });

  document.getElementById('editModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('editModal'))
      document.getElementById('editModal').classList.add('hidden');
  });

  document.getElementById('saveProfileBtn').addEventListener('click', async () => {
    const newName = document.getElementById('usernameInput').value.trim();
    const file    = document.getElementById('photoInput').files[0];
    const errEl   = document.getElementById('editError');
    errEl.textContent = '';

    if (!newName) { errEl.textContent = 'Nome é obrigatório.'; return; }
    if (newName.length < 3) { errEl.textContent = 'Nome precisa ter ao menos 3 caracteres.'; return; }

    const btn = document.getElementById('saveProfileBtn');
    btn.disabled = true; btn.textContent = 'Salvando...';

    let photoBase64 = currentPhotoBase64;
    if (file) {
      if (file.size > 200 * 1024) { errEl.textContent = 'Foto muito grande (máx. 200KB).'; btn.disabled=false; btn.textContent='Salvar'; return; }
      try { photoBase64 = await compressImage(file); }
      catch { errEl.textContent = 'Erro ao processar imagem.'; btn.disabled=false; btn.textContent='Salvar'; return; }
    }

    try {
      const uid = currentUser.uid;
      if (newName !== currentUsername) {
        const snap = await db.collection('usernames').doc(newName).get();
        if (snap.exists && snap.data().uid !== uid) {
          errEl.textContent = 'Este nome já está em uso.'; btn.disabled=false; btn.textContent='Salvar'; return;
        }
        if (currentUsername) await db.collection('usernames').doc(currentUsername).delete();
        await db.collection('usernames').doc(newName).set({ uid });
      }
      await db.collection('users').doc(uid).update({ username: newName, photoBase64 });
      currentUsername = newName;
      currentPhotoBase64 = photoBase64;
      document.getElementById('usernameDisplay').textContent = newName;
      setAvatar(photoBase64);
      document.getElementById('editModal').classList.add('hidden');
      showToast('✅ Perfil atualizado!', 'success');
    } catch (err) {
      console.error(err);
      errEl.textContent = 'Erro ao salvar. Tente novamente.';
    } finally {
      btn.disabled = false; btn.textContent = 'Salvar';
    }
  });

  function compressImage(file, maxW = 200, maxH = 200, q = 0.75) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > h) { if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; } }
          else       { if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; } }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL('image/jpeg', q));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
</script>
</body>
</html>
